[defaults]
inventory = ./inventory/

roles_path = ./roles/
collections_paths = ./.collections/

stdout_callback = yaml
bin_ansible_callbacks = true

forks = 10
gathering = smart
fact_caching = yaml
fact_caching_connection = ./.facts_cache/
fact_caching_timeout = 3600

retry_files_enabled = false
retry_files_save_path = ./.retries/

ansible_managed = Managed by Ansible -- do not edit directly.%n
  template: {file}
  date: %Y-%m-%d %H:%M:%S %Z
  user: {uid}
  host: {host}


[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey -o StrictHostKeyChecking=yes
pipelining = true
